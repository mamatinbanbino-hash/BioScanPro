<script>
    const video = document.getElementById('video-preview');
    const btn = document.getElementById('btn-main');
    const statusInd = document.getElementById('status-indicator');
    const statusTxt = document.getElementById('status-text');
    const loader = document.getElementById('top-loader');

    // URLs des modèles optimisés (plus rapides)
    const MODEL_URL = 'https://raw.githubusercontent.com/ml5js/ml5-data-and-models/main/models/faceapi/';

    window.onload = () => {
        setTimeout(() => { 
            document.getElementById('boot-screen').style.opacity = '0'; 
            setTimeout(() => document.getElementById('boot-screen').remove(), 1000); 
        }, 1500);
    };

    async function initIA() {
        try {
            // Chargement ultra-rapide des modèles Tiny
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL + 'tiny_face_detector_model-weights_manifest.json');
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL + 'face_landmark_68_model-weights_manifest.json');
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 400, height: 400 } 
            });
            
            video.srcObject = stream;
            
            // Mise à jour visuelle immédiate
            statusInd.className = "h-3 w-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
            statusTxt.innerText = "IA SYNCHRONISÉE. PRÊT POUR LE SCAN.";
            statusTxt.className = "text-[10px] font-bold text-green-500 uppercase tracking-widest";
            
            btn.disabled = false;
            btn.className = "w-full mt-8 py-6 rounded-2xl bg-cyan-600 text-white font-black text-xs tracking-[0.2em] transition-all hover:bg-cyan-500 border-none shadow-[0_0_20px_rgba(0,242,255,0.4)] flex items-center justify-center gap-4 uppercase cursor-pointer";
        } catch (err) {
            statusTxt.innerText = "ERREUR : ACCÈS CAMÉRA REQUIS";
            statusInd.className = "h-3 w-3 rounded-full bg-orange-500 animate-pulse";
            console.error("Erreur d'initialisation:", err);
        }
    }

    // Lancement automatique
    initIA();

    async function executeDeepScan() {
        btn.disabled = true;
        document.getElementById('scan-bar').style.display = "block";
        let p = 0;
        const timer = setInterval(() => {
            p++;
            loader.style.width = p + "%";
            btn.innerText = `CALCUL BIOMÉTRIQUE... ${p}%`;
            if(p >= 100) { 
                clearInterval(timer); 
                runFinalLogic(); 
            }
        }, 600); // Durée totale : 60 secondes
    }

    async function runFinalLogic() {
        const detect = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
        
        if(!detect) {
            alert("ERREUR : Visage non détecté. Rapprochez-vous et recommencez.");
            location.reload();
            return;
        }

        const lm = detect.landmarks;
        const leftEye = lm.getLeftEye();
        const rightEye = lm.getRightEye();
        
        // Calcul réel de l'asymétrie
        const sym = (Math.abs(leftEye[0].y - rightEye[0].y) * 15).toFixed(1);
        
        document.getElementById('scan-bar').style.display = "none";
        document.getElementById('results-area').classList.remove('hidden');
        document.getElementById('val-sym').innerText = sym + "%";
        document.getElementById('val-type').innerText = sym < 15 ? "Déséquilibre Musculaire" : "Asymétrie Structurelle";
        
        document.getElementById('p-sci').innerText = "Protocole recommandé : Massages 'Gua Sha' 5 min/soir et exercices de rééducation faciale pour tonifier les muscles faibles.";
        document.getElementById('p-surg').innerText = "CHU d'Angré : Consultation Service Maxillo-Facial (Standard : 27 22 49 61 00). Option curable via micro-intervention.";
        
        btn.innerText = "ANALYSE TERMINÉE";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>
